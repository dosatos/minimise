plan:
  name: "Ponytail refactor fleet (remaining 4): simplify each source file"
  description: |
    One task per source file. Each task applies a set of pre-vetted, behavior-
    preserving simplifications, adds/extends tests covering the touched code,
    and must leave the FULL suite green. A pytest gate runs after every task;
    a task that breaks tests fails and retries, so "simplify" can never silently
    become "break".

    cli.py was already refactored in a prior commit and is intentionally excluded.

    Shared rules for EVERY task:
    - Touch ONLY the one named source file (+ its test file when adding tests).
    - ZERO behavior change. Refactor only.
    - Do NOT add new dependencies. Do NOT invent abstractions for single use sites.
    - After editing, run `pytest tests/ -q` yourself and fix anything you broke
      BEFORE finishing. The orchestrator also runs it as a gate.
    - Do not create/delete mini jobs. No co-author trailers on commits.

  tasks:
    - id: "ponytail-database"
      name: "Simplify database.py"
      description: |
        Refactor ONLY src/minimise/database.py (419 lines). Apply these pre-vetted changes:
        - Extract `_row_to_job(row)` and `_row_to_task(row)` helpers; reuse them in
          get_job/list_jobs and get_task/list_tasks_for_job respectively.
        - Fix the dead `try/except IndexError` guards around optional columns (pid,
          base_commit, etc.): with sqlite3.Row, missing-key access raises KeyError,
          not IndexError, so those excepts never fire. Replace with a correct
          presence check (e.g. `row["x"] if "x" in row.keys() else None`). This is a
          latent-bug fix — keep the resulting value semantics identical (None when absent).
        - Dedupe the repeated `PRAGMA table_info(...)` reads into one helper.

        TESTS: extend tests/test_database.py to assert _row_to_job/_row_to_task
        round-trip a stored job/task correctly, including the optional-column-absent
        case (so the KeyError fix is locked in).
      goal: "database.py is smaller with identical schema/queries/return shapes; new mapping tests pass; full suite green."
      estimated_duration_min: 9
      post_task_hook: "pytest tests/ -q"

    - id: "ponytail-api-server"
      name: "Simplify api_server.py"
      description: |
        Refactor ONLY src/minimise/api_server.py (266 lines). Apply these pre-vetted changes:
        - Delete the no-op WebSocket handlers handle_connect/handle_disconnect
          (bodies are just `pass` + docstring; Flask-SocketIO handles these implicitly).
        - Hoist the inline `from flask_socketio import join_room/leave_room` up into
          the module-level flask_socketio import.
        - Extract a small `_load_job_with_tasks(job_id)` helper for the repeated
          "fetch job, attach tasks" three-liner.
        DO NOT add a blanket error-handling decorator. Routes return distinct status
        codes (200/201/400/404/500) and a catch-all wrapper risks flattening them —
        leave each handler's try/except as-is. PRESERVE the goal-check validation
        guard on POST /jobs (it is the only validation on that path).

        TESTS: extend tests/test_api_server.py to assert the routes still return their
        exact status codes and JSON payloads after the cleanup (especially POST /jobs
        validation rejecting a missing/invalid plan_path).
      goal: "api_server.py is smaller with identical routes/codes/payloads; route tests pass; full suite green."
      estimated_duration_min: 9
      post_task_hook: "pytest tests/ -q"

    - id: "ponytail-terminal-ui"
      name: "Simplify terminal_ui.py"
      description: |
        Refactor ONLY src/minimise/terminal_ui.py (210 lines). Apply these pre-vetted changes:
        - Collapse the double isinstance check to `isinstance(status, (JobStatus, TaskStatus))`.
        - Replace the explicit gantt bar-building loop with an equivalent
          "".join(...) comprehension producing the identical string.
        - Extract `_now_or_default(now)` returning `now or datetime.utcnow()` and use it
          in the two functions that default `now`.
        - Fix the redundant modulo in humanize_duration (e.g. `(total_seconds % 3600)`
          rather than `((total_seconds % 86400) % 3600)`) — same result.
        Keep datetime.utcnow() (do NOT switch to datetime.now()).

        TESTS: extend tests/test_terminal_ui.py (create it if absent, matching existing
        test style) to assert humanize_duration and the gantt bar render the SAME
        output as before for a few representative inputs.
      goal: "terminal_ui.py is smaller with byte-identical rendered output; render tests pass; full suite green."
      estimated_duration_min: 7
      post_task_hook: "pytest tests/ -q"

    - id: "ponytail-task-executor"
      name: "Simplify task_executor.py"
      description: |
        Refactor ONLY src/minimise/task_executor.py (195 lines). Apply these pre-vetted changes:
        - Extract `_finalize_task(task_id, status, output, retries)` that wraps the
          repeated `update_task_status(..., completed_at=datetime.utcnow())` calls in
          the COMPLETED, FAILED, and post-hook-failure paths. Reuse it in all three.
        - Remove the now-redundant inline comment(s) left behind.
        Do NOT merge the COMPLETED and FAILED blocks (COMPLETED has the commit+diff
        side-effect FAILED lacks). Do NOT touch the started_at handling (the proposed
        change is a no-op). Keep retry count, hook ordering, commit/diff behavior, and
        the return tuple identical.

        TESTS: extend tests/test_task_executor.py (or test_job_manager.py if that's
        where executor tests live) to assert a task still ends COMPLETED on success
        and FAILED on a failing post-task hook, with completed_at set — locking in
        that _finalize_task preserves the finalization behavior.
      goal: "task_executor.py is smaller with identical execution/finalization behavior; tests pass; full suite green."
      estimated_duration_min: 7
      post_task_hook: "pytest tests/ -q"
