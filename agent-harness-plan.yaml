name: AgentHarness Interface Refactor
briefing: |
  Centralize ALL Claude Code harness interaction behind a single AgentHarness
  interface, with ClaudeCodeHarness as the implementation. Today two callers
  (TaskExecutor via `claude -p` subprocess, PlanReviewer via the anthropic SDK)
  each duplicate Bedrock/Anthropic auth, env, and model logic. Unify both onto
  one `claude -p` transport behind one interface.

  AUTHORITATIVE SPEC (read it first, follow it exactly):
  docs/superpowers/specs/2026-06-21-agent-harness-interface-design.md

  Conventions:
  - Python 3.9+, package `minimise`, source in src/minimise/, tests in tests/.
  - Use TDD: write/adjust failing tests first, then implement.
  - Run `pytest tests/ -q` to verify. Baseline before this work: 199 passing.
  - Do NOT create exploratory `mini` jobs. Do not push or change git remotes.
  - Keep changes scoped to the spec. No unrelated refactoring.

tasks:
  - id: task-1-harness-module
    name: Create AgentHarness interface and ClaudeCodeHarness implementation (TDD)
    goal: >
      A new src/minimise/harness.py exists with HarnessResult, AgentHarness (ABC,
      single run() method), and ClaudeCodeHarness, fully unit-tested in
      tests/test_harness.py, with all new tests passing and no regression in the
      existing suite.
    estimated_duration_min: 25
    description: |
      Read the spec first:
      docs/superpowers/specs/2026-06-21-agent-harness-interface-design.md
      (sections "New module" and "Implementation: ClaudeCodeHarness").

      TDD — write tests/test_harness.py FIRST, then implement to green.

      Create src/minimise/harness.py with:
      1. @dataclass HarnessResult(success: bool, output: str, error: Optional[str] = None)
      2. AgentHarness(ABC) with one abstract method:
           run(self, prompt, *, cwd=None, timeout=300, model=None, allow_edits=False) -> HarnessResult
      3. ClaudeCodeHarness(AgentHarness):
         - _build_env(): MOVE the exact logic from TaskExecutor._build_claude_env
           (src/minimise/task_executor.py lines ~142-174). Common keys
           {PATH, HOME, USER, SHELL, LANG}; if CLAUDE_CODE_USE_BEDROCK == "1" add
           {CLAUDE_CODE_USE_BEDROCK, AWS_REGION, AWS_ACCESS_KEY_ID,
           AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_BEARER_TOKEN_BEDROCK};
           else add {ANTHROPIC_API_KEY}. Return filtered os.environ.
         - command construction: base ["claude","-p","--output-format","text"];
           append "--dangerously-skip-permissions" iff allow_edits;
           append "--model", model iff model is not None.
         - run(): subprocess.run(cmd, input=prompt, capture_output=True, text=True,
           timeout=timeout, cwd=cwd, env=self._build_env()). Map results
           (coalesce None stdout/stderr to "" defensively):
             returncode 0    -> HarnessResult(True, stdout or "")
             returncode != 0 -> HarnessResult(False, stdout or "", error=(stderr or ""))
             TimeoutExpired  -> HarnessResult(False, "", error="timeout after {timeout}s")
             other Exception -> HarnessResult(False, "", error=str(e))
         - import subprocess at module top (not inside the method).

      tests/test_harness.py must cover (mock subprocess via
      @patch("minimise.harness.subprocess.run"); isolate env with
      @patch.dict(os.environ, {...}, clear=True)):
        - _build_env bedrock path: includes AWS keys + CLAUDE_CODE_USE_BEDROCK,
          excludes ANTHROPIC_API_KEY.
        - _build_env anthropic path: includes ANTHROPIC_API_KEY, excludes AWS keys.
        - command has --dangerously-skip-permissions only when allow_edits=True.
        - command has --model X only when model given.
        - result mapping for returncode 0, non-zero, TimeoutExpired, generic exception.

      Verify: pytest tests/test_harness.py -q passes; pytest tests/ -q still 199+ passing.
      Output: confirm harness.py API signatures and the test list, for the next tasks.

  - id: task-2-task-executor
    name: Refactor TaskExecutor to depend on AgentHarness
    goal: >
      TaskExecutor no longer builds env or spawns subprocess directly; it delegates
      to an injected AgentHarness (default ClaudeCodeHarness). _build_claude_env is
      removed. All task_executor tests pass.
    estimated_duration_min: 20
    description: |
      Read the spec section "Consumer: TaskExecutor" first.
      Use the harness API confirmed in task-1's output.

      Edit src/minimise/task_executor.py:
      1. Constructor: add param `harness: Optional[AgentHarness] = None`, store
         `self.harness = harness or ClaudeCodeHarness()`. Import both from
         minimise.harness.
      2. DELETE the _build_claude_env method entirely (now lives in the harness).
      3. In _invoke_claude_code: keep ALL the prompt-building logic unchanged.
         Replace the subprocess.run(...) block with:
           result = self.harness.run(prompt, cwd=repo_root, allow_edits=True)
         (Do NOT pass timeout/model: the harness default timeout is 300s, which
         exactly matches the original subprocess timeout=300, so behavior is
         preserved; model stays the CLI default as today.)
           return result.success, (result.output if result.success
                                   else (result.error or result.output))
         where repo_root = str(self.jobs_dir.parent.parent) (same as today's cwd;
         jobs_dir is <repo>/.minimise/jobs so .parent.parent is the repo root —
         keep this derivation identical to avoid changing the agent's working dir).
         NOTE: this changes _invoke_claude_code's failure return from output-only to
         (result.error or result.output); ensure tests assert this contract.
         Remove the now-unused `import subprocess` inside the method and the
         TimeoutExpired/except handling (the harness owns that now).

      Update tests/test_task_executor.py (TDD — adjust tests first):
        - Any test that patched subprocess.run or _build_claude_env must instead
          inject a Mock/fake AgentHarness via TaskExecutor(..., harness=fake).
        - fake.run returns a HarnessResult; assert success/output propagation.
        - Assert harness.run was called with allow_edits=True and cwd=repo root,
          and that the prompt contains the task name/description.

      Verify: pytest tests/test_task_executor.py -q passes; pytest tests/ -q green.
      Do NOT change prompt text, MAX_RETRIES, hooks, or git/commit logic.
      Output: note any test signatures changed for downstream awareness.

  - id: task-3-plan-reviewer
    name: Refactor PlanReviewer onto the harness, drop anthropic SDK, add retry-once
    goal: >
      PlanReviewer uses an injected AgentHarness instead of the anthropic SDK; the
      `anthropic` import and the Anthropic/AnthropicBedrock auth branch are removed;
      review() retries parsing once and still fails loud (hard gate preserved). The
      reviewer tests are rewritten to mock the harness and all pass.
    estimated_duration_min: 30
    description: |
      Read the spec section "Consumer: PlanReviewer" first.
      Use the harness API confirmed in task-1.

      Edit src/minimise/plan_reviewer.py:
      1. REMOVE `from anthropic import Anthropic, AnthropicBedrock`. (anthropic is
         NOT in pyproject.toml, so no dependency-file edit is needed.)
      2. Constructor: drop the entire Anthropic/AnthropicBedrock client branch and
         the api_key handling. New signature:
         `def __init__(self, harness: Optional[AgentHarness] = None)` storing
         `self.harness = harness or ClaudeCodeHarness()`. Import from minimise.harness.
      3. Keep model selection in review(): if CLAUDE_CODE_USE_BEDROCK == "1" then
         model = os.environ.get("BEDROCK_MODEL_ID", "us.anthropic.claude-sonnet-4-6")
         else model = "claude-opus-4-8".
      4. Replace `self.client.messages.create(...)` + `response.content[0].text`
         with a helper that calls:
           result = self.harness.run(self._build_review_prompt(plan_text),
                                     model=model, timeout=120)
         If result.success is False -> raise ValueError describing the harness
         failure (review cannot be verified; must NOT silently pass).
      5. Retry-once on parse failure: try _parse_response(result.output); if it
         raises ValueError (unparseable), run the harness ONE more time and parse
         again; if the second parse also raises, propagate the ValueError.
      6. _format_plan, _build_review_prompt, _extract_json, _parse_response stay
         UNCHANGED (they already strip fences and fail loud).

      Rewrite tests/test_plan_reviewer.py (TDD):
        - Remove @patch('minimise.plan_reviewer.Anthropic') and env-based auth
          mocking. Inject a fake/Mock AgentHarness: PlanReviewer(harness=fake).
        - fake.run returns canned HarnessResult.output for cases: valid JSON,
          fenced ```json``` JSON, empty findings, unparseable-then-valid (assert
          run called twice, returns parsed findings), unparseable-twice (assert
          raises ValueError), and success=False (assert raises ValueError).
        - Delete tests asserting api-key init / no-key errors (auth moved to harness).
        - Keep/adjust the test asserting the plan text reaches the prompt (now via
          fake.run's first positional arg).

      Verify: pytest tests/test_plan_reviewer.py tests/test_plan_review_cli.py -q
      pass. cli.py needs no change (PlanReviewer() still uses the default harness).
      Output: confirm anthropic import is gone (grep) and retry behavior is tested.

  - id: task-4-full-verify
    name: Full-suite verification and dead-reference sweep
    goal: >
      The entire test suite passes (>= 199 + new harness tests), no remaining
      references to the anthropic SDK or _build_claude_env exist in src/, and the
      refactor matches the spec.
    estimated_duration_min: 15
    description: |
      Final verification (no new features):
      1. Run: pytest tests/ -q  -> must be all green, count >= prior 199 plus the
         new test_harness.py tests.
      2. grep the WHOLE repo for leftovers (exclude .git/.venv); the only
         allowed hits are in this plan file and the design spec, NOT in src/ or tests/:
         - `grep -rn --exclude-dir=.git --exclude-dir=.venv "AnthropicBedrock\|from anthropic\|import anthropic" .`
         - `grep -rn --exclude-dir=.git --exclude-dir=.venv "_build_claude_env" .`
         - `grep -rn --exclude-dir=.git --exclude-dir=.venv "messages.create" .`
      3. Confirm src/minimise/harness.py is the ONLY place constructing the claude
         command and building the env. TaskExecutor and PlanReviewer must only call
         self.harness.run(...).
      4. Sanity import check: `python -c "from minimise.harness import AgentHarness, ClaudeCodeHarness, HarnessResult"`.
      If any check fails, fix the offending file to satisfy the spec, then re-run.
      Output: paste the final pytest summary line and the (empty) grep results.
