plan:
  name: "Example Multi-Agent Plan"
  briefing: "A simple example plan demonstrating Minimise orchestration with task handover"
  documentation: |
    This plan shows how to:
    1. Define tasks with descriptions
    2. Use pre/post hooks for setup/cleanup
    3. Pass context between tasks via handover
    4. Track changes with git diffs

  pre_plan_hook: "echo '🚀 Starting plan execution...'"
  post_plan_hook: "echo '✅ Plan completed!'"

  tasks:
    - id: gather-requirements
      name: "Gather Requirements"
      description: |
        Analyze and document the requirements for this project.

        Output a structured summary of:
        - Project goals
        - User needs
        - Success criteria
        - Technical constraints
      pre_task_hook: "echo 'Task: Gathering requirements...'"
      post_task_hook: "echo 'Requirements gathered'"

    - id: design-architecture
      name: "Design Architecture"
      description: |
        Based on the requirements from the previous task, design the system architecture.

        Consider:
        - System components and their responsibilities
        - Data flow and interactions
        - Technology choices
        - Scalability and performance

        Reference the previous task's output to understand requirements.
      pre_task_hook: "echo 'Task: Designing architecture...'"
      post_task_hook: "echo 'Architecture designed'"

    - id: implement-core
      name: "Implement Core Components"
      description: |
        Implement the core components based on the architecture from the previous task.

        Focus on:
        - Core data models
        - Main orchestration logic
        - Critical path functionality

        Build incrementally and write tests as you go.
      pre_task_hook: "echo 'Task: Implementing core...'"
      post_task_hook: "echo 'Core implementation complete'"

    - id: write-tests
      name: "Write Comprehensive Tests"
      description: |
        Write tests for all components implemented in the previous task.

        Ensure:
        - Unit tests for individual functions
        - Integration tests for component interactions
        - Edge case coverage

        Reference the implementation to understand what needs testing.
      post_task_hook: "echo 'Tests written and passing'"

    - id: document
      name: "Document the Solution"
      description: |
        Create comprehensive documentation for the project.

        Include:
        - API documentation
        - Architecture diagrams
        - Usage examples
        - Troubleshooting guide

        Build on all previous task outputs to create complete documentation.
