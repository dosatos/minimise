name: Fix Gantt Chart Duration and Timeline Display
briefing: |
  The Gantt chart currently shows "—" for Duration and Timeline because tasks
  don't have timing data. This plan implements proper timing collection and
  display in the terminal UI.

  Issues to fix:
  1. Tasks need to capture start_time and end_time during execution
  2. format_duration() should convert elapsed time to human-readable format
  3. render_gantt_bar() should show visual timeline based on task timing
  4. Terminal UI should display actual timing data instead of "—"

pre_plan_hook: ""
post_plan_hook: ""

tasks:
  - name: Add Timing Fields to Task Model
    description: |
      Add start_time and end_time fields to Task model in src/minimise/models.py
      to capture when tasks actually execute. These will be populated by
      task_executor during execution.
    pre_task_hook: ""
    post_task_hook: ""

  - name: Update Task Executor to Capture Timing
    description: |
      Modify src/minimise/task_executor.py execute_task() to:
      - Set task.start_time when execution begins
      - Set task.end_time when execution completes
      - Update database with timing information via update_task_status()
    pre_task_hook: ""
    post_task_hook: ""

  - name: Improve format_duration() Implementation
    description: |
      Enhance src/minimise/terminal_ui.py format_duration() to:
      - Calculate elapsed time from start_time and end_time
      - Convert to human-readable format (1.2s, 100ms, 5m 30s, etc.)
      - Handle None values gracefully
    pre_task_hook: ""
    post_task_hook: ""

  - name: Enhance render_gantt_bar() Visual
    description: |
      Improve src/minimise/terminal_ui.py render_gantt_bar() to:
      - Calculate relative position in job timeline using timing data
      - Draw ASCII bar showing task position and duration
      - Show start/end markers if enough space
    pre_task_hook: ""
    post_task_hook: ""

  - name: Run Tests to Verify Timing
    description: |
      Execute pytest tests/ -v to verify:
      - Timing fields are properly stored
      - Duration formatting works correctly
      - Gantt bar rendering doesn't crash
      - All 42 tests still pass
    pre_task_hook: ""
    post_task_hook: ""
