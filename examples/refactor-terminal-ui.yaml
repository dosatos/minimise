name: "Refactor CLI to add Terminal UI module with Gantt chart"
briefing: |
  Separate terminal presentation logic from CLI command handling using TDD.
  Create a new terminal_ui.py module with formatting functions, refactor cli.py,
  and implement Gantt chart visualization for job status.

  Development methodology: Write tests first, then implement to pass them.

tasks:
  - name: "Implement terminal_ui module (TDD)"
    description: |
      Using TDD approach:
      1. Write tests in tests/test_terminal_ui.py for:
         - format_duration(started_at, completed_at) -> "1.2s", "0.8s"
         - render_gantt_bar(start, end, job_start, job_end, width) -> "████░░░░░"
         - render_task_table_with_gantt(job, tasks) -> rich.Table with Duration + Timeline
         - get_status_color(status) for all TaskStatus values
      2. Implement src/minimise/terminal_ui.py to pass all tests
      3. Move _get_status_color() from cli.py to terminal_ui.py
      4. Add docstrings and type hints

  - name: "Refactor cli.py to use terminal_ui (TDD)"
    description: |
      Using TDD approach:
      1. Write tests in tests/test_cli.py for job_status() command output format
      2. Update src/minimise/cli.py:
         - Import terminal_ui functions
         - Replace job_status() table logic with terminal_ui.render_task_table_with_gantt()
         - Update _get_status_color() import from terminal_ui
         - Keep command parsing/argument handling in cli.py
      3. All existing tests (42/42) should still pass

  - name: "Dogfood with real job"
    description: |
      Integration test with actual tool execution:
      - mini job new --plan examples/example-plan.yaml
      - mini job status <job_id>
      - Verify Duration and Timeline columns render correctly
      - Verify no formatting errors or regressions
      - All tests passing (42+new tests)
