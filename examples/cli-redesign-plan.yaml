name: CLI Redesign - Deferred Execution & Rich Results
briefing: |
  Implement minimise CLI redesign with deferred job execution (start/stop/resume),
  task-level results introspection (show/results), and JSON status output.

  Each task builds on previous output. Fresh context per task prevents drift.

  Final state: 95+ tests passing, all phases complete, dogfooding validates minimise itself.

tasks:
  - id: task-1-models
    name: Update Models - Replace CANCELLED with STOPPED
    description: |
      Update src/minimise/models.py:
      - Change JobStatus.CANCELLED → JobStatus.STOPPED
      - Ensure Task model still has all required fields (output, diff_path, description)
      - Verify no other code references CANCELLED directly

      Output: List all locations that need updates in subsequent tasks.

  - id: task-2-cli-stop-start
    name: Implement job start (PENDING only) and job stop (RUNNING → STOPPED)
    description: |
      Using output from task-1, update src/minimise/cli.py and src/minimise/job_manager.py:

      1. Modify job_new() to NOT auto-execute. Leave job in PENDING state.
      2. Add job_start() command - only works if status == PENDING
         - Spawns subprocess in background (non-blocking)
         - Returns immediately with subprocess PID
      3. Add job_stop() command - only works if status == RUNNING
         - Sends SIGTERM to subprocess (graceful)
         - Sets status to STOPPED

      Validation:
      - job start: error if already started
      - job stop: error if not running

      Output: Updated cli.py with new commands, subprocess spawning logic.

  - id: task-3-results-commands
    name: Add job results logs/diff with --task-id support
    description: |
      Update src/minimise/cli.py to add results subcommand group:

      1. Add job_results_logs() - retrieve task output
         - mini job results logs <id> - all tasks
         - mini job results logs <id> --task-id task-2 - single task
      2. Add job_results_diff() - retrieve git diffs
         - mini job results diff <id> - all tasks
         - mini job results diff <id> --task-id task-3 - single task

      Implementation:
      - Read from Task.output and Task.diff_path in database
      - Format output nicely (timestamps, status, content)

      Output: Results commands fully working, tested manually.

  - id: task-4-show-commands
    name: Add job show for plan/prompt introspection
    description: |
      Update src/minimise/cli.py and src/minimise/handover_manager.py:

      1. Add job_show() - display plan structure
         - mini job show <id> - show plan file path and task list
      2. Add job_show() with --task-id - display full prompt with handover
         - mini job show <id> --task-id task-2
         - Output: task description + previous task output + git diff at that point

      Implementation:
      - Read plan_path from Job
      - Reconstruct handover context using handover_manager
      - Display full prompt that will be/was sent to agent

      Output: Show commands display correct context.

  - id: task-5-resume-command
    name: Add job resume (FAILED/STOPPED only) with edge-case validation
    description: |
      Update src/minimise/cli.py and src/minimise/job_manager.py:

      1. Add job_resume() - restart from failed/stopped task + all subsequent
         - mini job resume <id>
         - Only works if status in (FAILED, STOPPED)

      2. Edge-case validation:
         - If plan was modified since job creation, validate:
           - Last completed task must exist in new plan
           - No incomplete tasks between last completed and next task to resume
           - Fail with clear error if plan structure changed unsafely

      3. Resume execution:
         - Find last completed task
         - Start from next task onward
         - Spawn background subprocess (same as job start)

      Output: Resume command working with safety validation.

  - id: task-6-status-json
    name: Enhance job status with --format json to expose task IDs
    description: |
      Update src/minimise/cli.py:

      1. Modify job_status() to support --format json
         - mini job status <id> - table format (human-friendly, current)
         - mini job status <id> --format json - JSON format (machine-friendly)

      2. JSON output schema:
         {
           "id": "...",
           "name": "...",
           "status": "...",
           "created_at": "...",
           "started_at": "...",
           "completed_at": "...",
           "tasks": [
             {
               "id": "task-1",
               "name": "...",
               "description": "...",
               "status": "...",
               "started_at": "...",
               "completed_at": "...",
               "duration_seconds": 45.2
             },
             ...
           ]
         }

      Output: JSON status showing all task metadata.

  - id: task-7-comprehensive-tests
    name: Write comprehensive tests for all new commands
    description: |
      Update tests/test_cli.py with new test cases:

      1. job start/stop lifecycle (5 tests)
         - start PENDING job → RUNNING
         - start already-started job → error
         - stop running job → STOPPED
         - stop non-running job → error

      2. job resume (4 tests)
         - resume FAILED job from failed task
         - resume STOPPED job from stopped task
         - resume PENDING job → error
         - resume with modified plan → validation error

      3. job show (3 tests)
         - show plan structure
         - show with --task-id displays prompt + handover
         - show non-existent task → error

      4. job results (3 tests)
         - results logs all tasks
         - results logs single task with --task-id
         - results diff with diffs per task

      5. job status --format json (2 tests)
         - JSON output parses correctly
         - JSON includes all task metadata

      Expected: All new tests pass, 95+ total tests.
      Output: Test results showing all passing.

  - id: task-8-docs-update
    name: Update README and TESTING.md with new CLI workflow
    description: |
      Update documentation:

      1. README.md
         - Update "Quick Start" with new workflow (create → show → start → resume)
         - Add section on job lifecycle (PENDING → RUNNING → STOPPED/FAILED/COMPLETED)
         - Add examples for each command

      2. TESTING.md
         - Add test instructions for new commands
         - Document edge cases (plan modification validation, etc.)

      3. Command reference
         - mini job new --plan FILE
         - mini job start <id>
         - mini job stop <id>
         - mini job resume <id>
         - mini job show <id> [--task-id <task_id>]
         - mini job results logs <id> [--task-id <task_id>]
         - mini job results diff <id> [--task-id <task_id>]
         - mini job status <id> [--format json]

      Output: Documentation updated, examples working.

  - id: task-9-final-verification
    name: Run full test suite and verify implementation
    description: |
      Final verification step:

      1. Run full test suite
         - pytest tests/ -v
         - Expected: 95+ tests passing

      2. Manual verification of key workflows
         - Create job with mini job new
         - Inspect plan with mini job show
         - Start job in background with mini job start
         - Monitor with mini job status
         - Stop and resume
         - Check results with mini job results logs/diff

      3. Verify dogfooding
         - This entire implementation used minimise itself
         - Each task built on previous task output (fresh context)
         - No context rot despite 9 sequential tasks
         - All changes integrate cleanly

      Output: Summary of final state - all tests passing, all commands working, minimise dogfooding validates the tool.

