name: Fix Job Cancellation Feature
briefing: |
  Implement proper job cancellation by adding CANCELLED status to enums
  and implementing the cancel_job() method that was previously a stub.

  This fixes the issue where `mini job stop` always fails because cancel_job()
  returns False and doesn't actually update the job status.

pre_plan_hook: ""
post_plan_hook: ""

tasks:
  - name: Add CANCELLED Status to Enums
    description: |
      Add CANCELLED = "cancelled" to both JobStatus and TaskStatus enums
      in src/minimise/models.py to support job cancellation state.
    pre_task_hook: ""
    post_task_hook: ""

  - name: Implement cancel_job() Method
    description: |
      Replace the stub cancel_job() in src/minimise/job_manager.py with
      proper implementation that:
      - Gets the job from database
      - Returns False if job not found
      - Updates job status to CANCELLED with completed_at timestamp
      - Updates all PENDING/RUNNING tasks to CANCELLED status
      - Returns True on success
    pre_task_hook: ""
    post_task_hook: ""

  - name: Update Test for Validation
    description: |
      Update test_cancel_job_basic in tests/test_job_manager.py to:
      - Verify cancel returns True when job exists
      - Verify job status is CANCELLED after cancel
      - Verify RUNNING tasks are marked CANCELLED
    pre_task_hook: ""
    post_task_hook: ""

  - name: Run Test Suite
    description: |
      Run full test suite to ensure all 42 tests pass and no regressions.
      Execute: pytest tests/ -v
    pre_task_hook: ""
    post_task_hook: ""
